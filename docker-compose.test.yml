version: '3.8'

services:
  db-test:
    image: postgres:16-alpine
    container_name: ticketfast-db-test
    environment:
      POSTGRES_DB: ticketfast_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketfast-api-test
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-test:5432/ticketfast_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SERVER_PORT: 8001
      SPRING_PROFILES_ACTIVE: test
    depends_on:
      db-test:
        condition: service_healthy
